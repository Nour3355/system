<!DOCTYPE html>
<html lang="ar" dir="rtl" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة التعديلات والتفصيل | براند</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;500;600;700;800;900;1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#1E293B",
                        secondary: "#64748B",
                        accent: "#EF4444",
                        success: "#22C55E",
                        warning: "#F59E0B",
                        background: "#F8FAFC",
                        surface: "#FFFFFF",
                        "on-surface": "#0F172A",
                        outline: "#CBD5E1",
                    },
                    borderRadius: {
                        'DEFAULT': '0.75rem',
                        'lg': '1rem',
                        'xl': '1.5rem',
                        '2xl': '2rem',
                        '3xl': '2.5rem',
                    },
                    fontFamily: {
                        display: ["Cairo", "sans-serif"],
                        body: ["Cairo", "sans-serif"],
                    },
                    boxShadow: {
                        'premium': '0 10px 40px -10px rgba(0,0,0,0.05)',
                        'premium-hover': '0 20px 50px -12px rgba(0,0,0,0.08)',
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        [x-cloak] { display: none !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
        body { font-family: 'Cairo', sans-serif; background-color: #F8FAFC; }
    </style>
    <script src="router.js"></script>
    <link href="responsive.css" rel="stylesheet">
    <script src="auth.js"></script>
</head>
<body class="text-on-surface antialiased overflow-hidden" x-data="alterationsApp()" x-init="initData()">
    
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar Backdrop -->
        <div class="sidebar-backdrop" :class="mobileMenuOpen ? 'active' : ''" @click="mobileMenuOpen = false"></div>

        <!-- القائمة الجانبية (Sidebar) -->
        <aside 
            @mouseenter="sidebarExpanded = true" 
            @mouseleave="sidebarExpanded = false"
            class="sidebar-main sticky top-0 h-screen bg-primary text-white z-[70] transition-all duration-300 overflow-hidden group shrink-0 shadow-2xl flex flex-col"
            :class="[(sidebarExpanded || sidebarLocked) ? 'w-72' : 'w-20', mobileMenuOpen ? 'mobile-open' : '']">
            <div class="py-6 px-5 flex items-center justify-between overflow-hidden">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 shrink-0 rounded-xl bg-accent flex items-center justify-center shadow-lg shadow-accent/20">
                        <span class="material-symbols-outlined text-white font-bold text-lg">shopping_bag</span>
                    </div>
                    <h1 class="text-xl font-extrabold tracking-tight transition-opacity duration-300 whitespace-nowrap" :class="(sidebarExpanded || sidebarLocked) ? 'opacity-100' : 'opacity-0'">براند</h1>
                </div>
                <button @click="sidebarLocked = !sidebarLocked; localStorage.setItem('sidebarLocked', sidebarLocked)" 
                        class="transition-all duration-300 hover:bg-white/10 p-2 rounded-lg"
                        :class="(sidebarExpanded || sidebarLocked) ? 'opacity-100' : 'opacity-0 pointer-events-none'">
                    <span class="material-symbols-outlined text-sm" :style="sidebarLocked ? 'font-variation-settings: \'FILL\' 1' : ''">push_pin</span>
                </button>
            </div>

            <nav class="mt-4 px-3 flex flex-col gap-2 flex-1 overflow-y-auto no-scrollbar">
                <a href="Dashboard.html" class="nav-link flex items-center rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-all">
                    <div class="w-14 h-12 flex items-center justify-center shrink-0">
                        <span class="material-symbols-outlined">dashboard</span>
                    </div>
                    <span class="transition-opacity duration-300 whitespace-nowrap overflow-hidden" :class="(sidebarExpanded || sidebarLocked) ? 'opacity-100' : 'opacity-0'">لوحة التحكم</span>
                </a>
                <a href="index.html" class="nav-link flex items-center rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-all">
                    <div class="w-14 h-12 flex items-center justify-center shrink-0">
                        <span class="material-symbols-outlined">point_of_sale</span>
                    </div>
                    <span class="transition-opacity duration-300 whitespace-nowrap overflow-hidden" :class="(sidebarExpanded || sidebarLocked) ? 'opacity-100' : 'opacity-0'">الكاشير</span>
                </a>
                <a href="Rentals.html" class="nav-link flex items-center rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-all">
                    <div class="w-14 h-12 flex items-center justify-center shrink-0">
                        <span class="material-symbols-outlined">styler</span>
                    </div>
                    <span class="transition-opacity duration-300 whitespace-nowrap overflow-hidden" :class="(sidebarExpanded || sidebarLocked) ? 'opacity-100' : 'opacity-0'">التأجير</span>
                </a>
                <a href="Alterations.html" class="nav-link flex items-center rounded-xl bg-white/10 text-white font-medium transition-all">
                    <div class="w-14 h-12 flex items-center justify-center shrink-0">
                        <span class="material-symbols-outlined">content_cut</span>
                    </div>
                    <span class="transition-opacity duration-300 whitespace-nowrap overflow-hidden" :class="(sidebarExpanded || sidebarLocked) ? 'opacity-100' : 'opacity-0'">التعديلات</span>
                </a>
                <a href="Customers.html" class="nav-link flex items-center rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-all">
                    <div class="w-14 h-12 flex items-center justify-center shrink-0">
                        <span class="material-symbols-outlined">group</span>
                    </div>
                    <span class="transition-opacity duration-300 whitespace-nowrap overflow-hidden" :class="(sidebarExpanded || sidebarLocked) ? 'opacity-100' : 'opacity-0'">العملاء</span>
                </a>
                <a href="Inventory.html" class="nav-link flex items-center rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-all">
                    <div class="w-14 h-12 flex items-center justify-center shrink-0">
                        <span class="material-symbols-outlined">inventory_2</span>
                    </div>
                    <span class="transition-opacity duration-300 whitespace-nowrap overflow-hidden" :class="(sidebarExpanded || sidebarLocked) ? 'opacity-100' : 'opacity-0'">المخزون</span>
                </a>
                <a href="Suppliers.html" class="nav-link flex items-center rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-all">
                    <div class="w-14 h-12 flex items-center justify-center shrink-0">
                        <span class="material-symbols-outlined">local_shipping</span>
                    </div>
                    <span class="transition-opacity duration-300 whitespace-nowrap overflow-hidden" :class="(sidebarExpanded || sidebarLocked) ? 'opacity-100' : 'opacity-0'">الموردين</span>
                </a>
                <a href="Employees.html" class="nav-link flex items-center rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-all">
                    <div class="w-14 h-12 flex items-center justify-center shrink-0">
                        <span class="material-symbols-outlined">badge</span>
                    </div>
                    <span class="transition-opacity duration-300 whitespace-nowrap overflow-hidden" :class="(sidebarExpanded || sidebarLocked) ? 'opacity-100' : 'opacity-0'">الموظفين</span>
                </a>
                <a href="Expenses.html" class="nav-link flex items-center rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-all">
                    <div class="w-14 h-12 flex items-center justify-center shrink-0">
                        <span class="material-symbols-outlined">receipt_long</span>
                    </div>
                    <span class="transition-opacity duration-300 whitespace-nowrap overflow-hidden" :class="(sidebarExpanded || sidebarLocked) ? 'opacity-100' : 'opacity-0'">المصاريف</span>
                </a>
                <a href="Reports.html" class="nav-link flex items-center rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-all">
                    <div class="w-14 h-12 flex items-center justify-center shrink-0">
                        <span class="material-symbols-outlined">bar_chart</span>
                    </div>
                    <span class="transition-opacity duration-300 whitespace-nowrap overflow-hidden" :class="(sidebarExpanded || sidebarLocked) ? 'opacity-100' : 'opacity-0'">التقارير</span>
                </a>
                <a href="Settings.html" class="nav-link flex items-center rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-all">
                    <div class="w-14 h-12 flex items-center justify-center shrink-0">
                        <span class="material-symbols-outlined">settings</span>
                    </div>
                    <span class="transition-opacity duration-300 whitespace-nowrap overflow-hidden" :class="(sidebarExpanded || sidebarLocked) ? 'opacity-100' : 'opacity-0'">الإعدادات</span>
                </a>
            </nav>

            <div class="p-3 mt-auto border-t border-white/10">
                <button onclick="logout()" class="w-full flex items-center rounded-xl text-red-400 hover:bg-red-500/10 hover:text-red-300 transition-all">
                    <div class="w-14 h-12 flex items-center justify-center shrink-0">
                        <span class="material-symbols-outlined">logout</span>
                    </div>
                    <span class="transition-opacity duration-300 whitespace-nowrap overflow-hidden" :class="(sidebarExpanded || sidebarLocked) ? 'opacity-100' : 'opacity-0'">تسجيل الخروج</span>
                </button>
            </div>
        </aside>

        <!-- منطقة المحتوى الرئيسية -->
        <div class="flex-1 flex flex-col min-w-0 h-screen overflow-y-auto bg-background">
            <!-- الهيدر (Header) -->
            <header class="h-20 bg-white/70 backdrop-blur-xl border-b border-outline sticky top-0 z-40 px-4 md:px-8 flex items-center justify-between">
                <div class="flex items-center gap-3 flex-1">
                    <button @click="mobileMenuOpen = !mobileMenuOpen" class="mobile-menu-btn w-10 h-10 items-center justify-center rounded-xl bg-primary text-white">
                        <span class="material-symbols-outlined">menu</span>
                    </button>
                    <div class="hidden sm:block">
                        <h2 class="text-xl font-extrabold text-primary">إدارة التعديلات والتفصيل</h2>
                        <p class="text-[10px] text-secondary font-bold uppercase tracking-widest">متابعة طلبات العملاء وحالة التنفيذ</p>
                    </div>
                </div>
                <div class="flex items-center gap-2 md:gap-4">
                    <div id="user-info-display" class="flex items-center gap-3 pr-4 md:border-r border-outline hidden md:flex"></div>
                </div>
            </header>

            <main class="p-4 md:p-8">
                <div class="max-w-7xl mx-auto">
                    <!-- Tabs -->
                    <div class="flex flex-wrap gap-2 mb-8 bg-white/50 backdrop-blur-md p-1.5 rounded-3xl border-2 border-white shadow-premium w-fit">
                        <button @click="currentTab = 'pending'" :class="currentTab === 'pending' ? 'bg-primary text-white shadow-xl scale-105' : 'text-secondary hover:text-primary'" class="px-8 py-3 rounded-2xl text-xs font-black transition-all duration-300 flex items-center gap-2">
                            <span class="material-symbols-outlined text-lg">timer</span> تحت التنفيذ
                        </button>
                        <button @click="currentTab = 'completed'" :class="currentTab === 'completed' ? 'bg-success text-white shadow-xl scale-105' : 'text-secondary hover:text-primary'" class="px-8 py-3 rounded-2xl text-xs font-black transition-all duration-300 flex items-center gap-2">
                            <span class="material-symbols-outlined text-lg">check_circle</span> جاهزة للاستلام
                        </button>
                        <button @click="currentTab = 'delivered'" :class="currentTab === 'delivered' ? 'bg-secondary text-white shadow-xl scale-105' : 'text-secondary hover:text-primary'" class="px-8 py-3 rounded-2xl text-xs font-black transition-all duration-300 flex items-center gap-2">
                            <span class="material-symbols-outlined text-lg">handshake</span> تم التسليم
                        </button>
                    </div>

                    <!-- Alterations Grid -->
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        <template x-for="alt in filteredAlterations" :key="alt.id">
                            <div class="group bg-white rounded-[2.5rem] border-2 border-white shadow-premium hover:shadow-premium-hover hover:border-primary/10 transition-all duration-500 overflow-hidden flex flex-col">
                                <div class="p-8 border-b border-slate-50 bg-slate-50/50 flex justify-between items-start relative">
                                    <div class="absolute top-0 right-0 w-24 h-24 bg-primary/5 rounded-bl-[4rem] -mr-10 -mt-10 group-hover:bg-primary/10 transition-colors"></div>
                                    <div class="relative">
                                        <h3 class="text-xl font-black text-primary mb-1" x-text="alt.customer_name"></h3>
                                        <div class="flex items-center gap-2">
                                            <span class="px-2 py-0.5 bg-primary/10 text-primary rounded-lg text-[9px] font-black">فاتورة #<span x-text="alt.order_id"></span></span>
                                            <span class="text-[9px] text-secondary font-bold uppercase tracking-tighter" x-text="formatFullDate(alt.created_at)"></span>
                                        </div>
                                    </div>
                                    <div :class="{
                                        'bg-amber-100 text-amber-600 ring-4 ring-amber-50': alt.status === 'pending',
                                        'bg-blue-100 text-blue-600 ring-4 ring-blue-50': alt.status === 'in_progress',
                                        'bg-success/10 text-success ring-4 ring-success/5': alt.status === 'completed',
                                        'bg-slate-100 text-slate-500 ring-4 ring-slate-50': alt.status === 'delivered'
                                    }" class="px-4 py-1.5 rounded-xl text-[10px] font-black uppercase relative z-10" x-text="statusLabel(alt.status)"></div>
                                </div>
                                
                                <div class="p-8 flex-1">
                                    <div class="flex items-start gap-4 mb-8">
                                        <div class="w-12 h-12 rounded-2xl bg-slate-100 flex items-center justify-center shrink-0 group-hover:scale-110 transition-transform duration-500">
                                            <span class="material-symbols-outlined text-secondary">content_cut</span>
                                        </div>
                                        <div>
                                            <p class="text-[10px] text-secondary font-extrabold uppercase tracking-widest mb-1.5">وصف التعديلات المطلوبة</p>
                                            <p class="text-sm font-bold text-primary leading-relaxed" x-text="alt.description"></p>
                                        </div>
                                    </div>

                                    <div class="grid grid-cols-2 gap-4 mb-8">
                                        <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 group-hover:bg-white transition-colors duration-500">
                                            <div class="flex items-center gap-2 mb-1">
                                                <span class="material-symbols-outlined text-[14px] text-secondary">calendar_today</span>
                                                <p class="text-[9px] text-secondary font-extrabold uppercase tracking-widest">تاريخ الاستلام</p>
                                            </div>
                                            <p class="text-xs font-black" :class="isLate(alt.due_date) ? 'text-accent' : 'text-primary'" x-text="formatDate(alt.due_date)"></p>
                                        </div>
                                        <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 group-hover:bg-white transition-colors duration-500">
                                            <div class="flex items-center gap-2 mb-1">
                                                <span class="material-symbols-outlined text-[14px] text-secondary">storefront</span>
                                                <p class="text-[9px] text-secondary font-extrabold uppercase tracking-widest">الفرع</p>
                                            </div>
                                            <p class="text-xs font-black text-primary">المخزن الرئيسي</p>
                                        </div>
                                    </div>
                                    
                                    <div class="mt-auto">
                                        <template x-if="alt.status === 'pending'">
                                            <button @click="updateStatus(alt.id, 'completed')" class="w-full py-4 bg-success text-white rounded-2xl text-xs font-black hover:bg-green-600 hover:shadow-lg hover:shadow-success/20 transition-all duration-300 flex items-center justify-center gap-2 group/btn">
                                                <span class="material-symbols-outlined text-lg group-hover/btn:rotate-12 transition-transform">verified</span> تم الانتهاء من التعديل
                                            </button>
                                        </template>
                                        <template x-if="alt.status === 'completed'">
                                            <button @click="updateStatus(alt.id, 'delivered')" class="w-full py-4 bg-primary text-white rounded-2xl text-xs font-black hover:bg-slate-800 hover:shadow-lg hover:shadow-primary/20 transition-all duration-300 flex items-center justify-center gap-2 group/btn">
                                                <span class="material-symbols-outlined text-lg group-hover/btn:scale-110 transition-transform">handshake</span> تسليم للعميل الآن
                                            </button>
                                        </template>
                                        <template x-if="alt.status === 'delivered'">
                                            <div class="w-full py-4 bg-slate-50 text-secondary text-center rounded-2xl text-[10px] font-black italic border border-dashed border-slate-200">
                                                <span class="flex items-center justify-center gap-2">
                                                    <span class="material-symbols-outlined text-lg">check_circle</span> تمت العملية بنجاح
                                                </span>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </template>

                        <!-- Empty State -->
                        <template x-if="filteredAlterations.length === 0">
                            <div class="col-span-full py-20 flex flex-col items-center justify-center bg-white rounded-[3rem] border-2 border-dashed border-slate-200">
                                <div class="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center mb-6">
                                    <span class="material-symbols-outlined text-5xl text-slate-300">inventory_2</span>
                                </div>
                                <h3 class="text-xl font-black text-primary mb-2">لا توجد طلبات هنا</h3>
                                <p class="text-secondary font-bold">كل الطلبات التي تندرج تحت هذا القسم تم الانتهاء منها</p>
                            </div>
                        </template>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('alterationsApp', () => ({
                alterations: [],
                currentTab: 'pending',
                sidebarExpanded: false,
                sidebarLocked: localStorage.getItem('sidebarLocked') === 'true',
                mobileMenuOpen: false,

                async initData() {
                    try {
                        const res = await fetch('/api/alterations');
                        this.alterations = await res.json();
                    } catch (err) {
                        console.error('Error fetching alterations:', err);
                    }
                },

                get filteredAlterations() {
                    if (this.currentTab === 'pending') {
                        return this.alterations.filter(a => a.status === 'pending' || a.status === 'in_progress');
                    }
                    return this.alterations.filter(a => a.status === this.currentTab);
                },

                statusLabel(status) {
                    const labels = {
                        'pending': 'تحت التنفيذ',
                        'in_progress': 'جاري العمل',
                        'completed': 'جاهز للاستلام',
                        'delivered': 'تم التسليم'
                    };
                    return labels[status] || status;
                },

                formatDate(dateStr) {
                    if (!dateStr) return '-';
                    return new Date(dateStr).toLocaleDateString('ar-EG', { day: 'numeric', month: 'long', year: 'numeric' });
                },

                formatFullDate(dateStr) {
                    if (!dateStr) return '-';
                    return new Date(dateStr).toLocaleDateString('ar-EG', { 
                        day: 'numeric', 
                        month: 'short', 
                        hour: '2-digit', 
                        minute: '2-digit' 
                    });
                },

                isLate(dueDate) {
                    if (!dueDate) return false;
                    const d = new Date(dueDate);
                    const today = new Date();
                    today.setHours(0,0,0,0);
                    return d < today;
                },

                async updateStatus(id, newStatus) {
                    try {
                        const res = await fetch(`/api/alterations/${id}`, {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ status: newStatus })
                        });
                        if (res.ok) {
                            await this.initData();
                        }
                    } catch (err) {
                        console.error('Error updating status:', err);
                    }
                }
            }));
        });
    </script>
</body>
</html>
